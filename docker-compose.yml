services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aiops
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: "3001"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
